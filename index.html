<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Restaurateur | 精品經營藝術</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Parisienne&family=Cormorant+Garamond:ital,wght@1,500&family=Montserrat:wght@300;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --indigo-deep: #0e101a;
            --champagne-gold: #e2d1c3;
            --sun-gold: #fbbf24;
            --moon-blue: #818cf8;
            --rose-accent: #f43f5e;
        }

        body {
            background-color: var(--indigo-deep);
            color: #f0f2f5;
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .font-serif { font-family: 'Cormorant Garamond', serif; }
        .font-cursive { font-family: 'Parisienne', cursive; }

        /* 背景噴砂質感 */
        .noise-bg {
            position: fixed;
            inset: 0;
            opacity: 0.03;
            pointer-events: none;
            z-index: 1;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 250 250' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        }

        /* 主容器 */
        .app-container {
            width: 95%;
            max-width: 420px;
            height: 85vh;
            max-height: 800px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(226, 209, 195, 0.15);
            border-radius: 3.5rem;
            backdrop-filter: blur(25px);
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.8);
            z-index: 10;
            overflow: hidden;
        }

        /* 畫面切換動畫 */
        .screen {
            display: none;
            flex-direction: column;
            height: 100%;
            padding: 2rem;
            animation: fadeIn 0.8s ease-out;
        }
        .screen.active { display: flex; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 藝術按鈕 */
        .btn-gold {
            background: transparent;
            border: 1px solid rgba(251, 191, 36, 0.4);
            color: var(--sun-gold);
            padding: 1.2rem;
            border-radius: 2rem;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            transition: all 0.3s;
            cursor: pointer;
        }
        .btn-gold:hover {
            background: rgba(251, 191, 36, 0.08);
            box-shadow: 0 0 30px rgba(251, 191, 36, 0.1);
        }

        .btn-option {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 1.4rem;
            border-radius: 1.8rem;
            text-align: left;
            transition: all 0.3s;
            cursor: pointer;
            width: 100%;
            margin-bottom: 1rem;
        }
        .btn-option:hover {
            border-color: rgba(251, 191, 36, 0.5);
            background: rgba(255, 255, 255, 0.06);
            transform: translateX(5px);
        }

        /* 天秤元素 */
        #beam { transition: transform 1.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .viz-glow { transition: transform 1s ease-in-out, filter 1s ease-in-out; }
        
        .sun-glow { filter: drop-shadow(0 0 15px var(--sun-gold)); }
        .moon-glow { filter: drop-shadow(0 0 15px var(--moon-blue)); }

        .custom-scroll::-webkit-scrollbar { width: 3px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(226, 209, 195, 0.2); border-radius: 10px; }
    </style>
</head>

<div class="noise-bg"></div>

<div class="app-container">
    
    <!-- 1. START SCREEN -->

                    </g>

                </g>
                <line x1="150" y1="80" x2="150" y2="135" stroke="#E2D1C3" stroke-width="0.4" opacity="0.3" />
                <defs>
                    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                        <stop offset="0%" stop-color="var(--sun-gold)" />
                        <stop offset="50%" stop-color="#E2D1C3" />
                        <stop offset="100%" stop-color="var(--moon-blue)" />
                    </linearGradient>
                </defs>
            </svg>
            <div class="flex gap-20 text-[7px] tracking-[0.4em] font-bold text-white/20 uppercase mt-2">
                <span>Profit</span><span>Equity</span>
            </div>
        </div>

        <div class="flex-grow flex flex-col custom-scroll overflow-y-auto pr-1">
            <div class="flex justify-between items-center mb-6">

                <span id="ui-link" class="text-[8px] text-white/30 tracking-widest font-bold uppercase">CEDAW INSIGHT</span>
            </div>
            <h3 id="ui-title" class="text-xl font-serif text-[#E2D1C3] mb-4 leading-tight"></h3>
            <p id="ui-desc" class="text-slate-400 text-sm italic border-l-2 border-white/10 pl-6 mb-10 leading-relaxed"></p>
            
            <div id="ui-options" class="mt-auto"></div>
        </div>
    </div>

    <!-- 3. SUDDEN EVENT SCREEN -->
    <div id="screen-sudden" class="screen justify-center items-center text-center">
        <div class="w-16 h-16 rounded-full border border-rose-500/30 flex items-center justify-center mb-8 text-rose-500">

    </div>

    <!-- 4. RESULT SCREEN -->

        <span class="text-[10px] tracking-[0.8em] text-white/20 uppercase font-bold mb-8">Strategic Analysis</span>
        <h2 id="ui-result-title" class="text-3xl font-serif italic mb-8"></h2>
        <div class="bg-white/[0.03] p-10 rounded-[3rem] border border-white/10 mb-14 w-full italic text-sm text-slate-400 leading-relaxed shadow-inner">
            <p id="ui-result-desc"></p>
        </div>
        <button onclick="location.reload()" class="text-[10px] font-bold text-white/30 uppercase tracking-[0.4em] hover:text-[#E2D1C3] transition-colors">再次啟動</button>
    </div>

</div>

<footer class="fixed bottom-6 text-[8px] tracking-[1em] text-white/10 uppercase font-bold text-center z-0">
    Integrity • Leadership • Vision

        { title: "單親優先排班", desc: "針對單親同仁提供固定早班或彈性方案。", link: "友善家庭", options: [{ label: "支持彈性方案", p: 20, e: 20 }, { label: "公平抽籤輪班", p: 15, e: -8 }] },
        { title: "聽障實習生", desc: "學校推薦優秀生，需購置閃光導引燈。", link: "CEDAW 第 4 條", options: [{ label: "購置設備全體培訓", p: 30, e: 25 }, { label: "以安全理由婉拒", p: 10, e: -15 }] },
        { title: "移工玻璃天花板", desc: "跨國移工因語言障礙無法晉升培訓。", link: "CEDAW 第 11 條", options: [{ label: "提供培訓並拔擢", p: 40, e: 25 }, { label: "維持現有職務分工", p: 15, e: -12 }] },
        { title: "生理假優化", desc: "提供優於法規全薪假，營造友善環境。", link: "CEDAW 第 4 條", options: [{ label: "建立友善給假機制", p: 25, e: 20 }, { label: "考核扣分警示", p: 18, e: -20 }] },
        { title: "技能證照補貼", desc: "全額補貼考取平權或專業技術證照。", link: "CEDAW 第 10 條", options: [{ label: "證照獎勵品牌升", p: 35, e: 22 }, { label: "自行負擔培訓", p: 15, e: -8 }] },
        { title: "職場教練計畫", desc: "為女性新人配置教練，縮短摸索成本。", link: "培力計畫", options: [{ label: "發放教練津貼", p: 28, e: 20 }, { label: "讓其自然磨合", p: 12, e: -5 }] },
        { title: "多元文化週", desc: "舉辦員工母國文化分享，提升凝聚力。", link: "族群包容", options: [{ label: "支持活動開展", p: 22, e: 25 }, { label: "工作優先處理", p: 15, e: -10 }] },
        { title: "新進員工導師", desc: "每位新人指派職場導師，大幅降低流失。", link: "教育培訓", options: [{ label: "執行導師制", p: 35, e: 20 }, { label: "傳統師徒模式", p: 15, e: -10 }] },
        { title: "跨性別制服選用", desc: "允許員工依認同選擇制服剪裁。", link: "CEDAW 第 5 條", options: [{ label: "開放自主選擇", p: 25, e: 25 }, { label: "依生理性別規定", p: 10, e: -20 }] },
        { title: "招募姓名去標籤", desc: "面試階段隱藏姓名性別，錄取高手。", link: "消除偏見", options: [{ label: "實施去標籤技術", p: 45, e: 20 }, { label: "維持傳統履歷", p: 20, e: -10 }] },
        { title: "產後回歸專案", desc: "產後適應期減工時不減福利，留住核心。", link: "CEDAW 第 11 條", options: [{ label: "支持漸進回歸", p: 30, e: 25 }, { label: "全力投入否則離職", p: 25, e: -35 }] },
        { title: "年度榮譽主廚", desc: "邀請平權女性專家擔任合作主廚。", link: "價值傳播", options: [{ label: "支付高額顧問費", p: 55, e: 35 }, { label: "邀請名媛客串", p: 30, e: -15 }] }
    ];

    const suddenLibrary = [
        { title: "【法規大稽查】", desc: "政府突擊檢查性平條款。若數值不足將面臨停業處分。", p: -50, e: 0 },
        { title: "【社群媒體盛讚】", desc: "友善政策被廣為流傳，引發全國性訂位爆發。", p: 60, e: 20 },
        { title: "【國際金獎認證】", desc: "榮獲國際平權標章，全球加盟金大幅提升。", p: 80, e: 35 },
        { title: "【人才離職潮】", desc: "因忽視員工心聲引發抗議，核心團隊離職。", p: -40, e: -30 },
        { title: "【ESG 報告優選】", desc: "被評為年度 ESG 透明企業，大型金控集團入股。", p: 50, e: 25 },
        { title: "【供應商醜聞】", desc: "合作夥伴爆發性騷擾爭議，您的品牌連帶受責。", p: -30, e: -35 },
        { title: "【數位轉型成功】", desc: "平權導向排班系統研發成功，人力配置成本大降。", p: 55, e: 10 },
        { title: "【育兒友善標章】", desc: "獲頒官方標章，本月補助金與租稅優惠到帳。", p: 35, e: 20 },
        { title: "【薪資缺口爆料】", desc: "匿名員工爆料內部薪資制度不公，名譽受損。", p: -25, e: -30 },
        { title: "【國際巨星造訪】", desc: "知名平權活動家發文推廣，品牌效應驚人。", p: 60, e: 15 },
        { title: "【多元文化節獎】", desc: "因推廣多元包容獲得城市文化貢獻獎，獲利溢價。", p: 40, e: 25 },
        { title: "【法律諮詢週】", desc: "內部法律扶助計畫提升了弱勢員工的保障感。", p: 15, e: 15 },
        { title: "【品牌聯名大賣】", desc: "與人權組織推出的聯名公益晚宴門票被搶購一空。", p: 70, e: 20 },
        { title: "【培訓紅利】", desc: "早先的女性領導力培訓開始產生成效，效率提升。", p: 30, e: 10 },
        { title: "【惡意抹黑戰】", desc: "競爭對手抹黑您的平權政策，需要緊急預算應對。", p: -20, e: 5 }
    ];

    // --- 遊戲邏輯控制 ---
    let state = { p: 50, e: 50, round: 0, queue: [], pendingSudden: null };

    function initGame() {
        state.queue = [...eventLibrary].sort(() => Math.random() - 0.5).slice(0, 20);
        state.round = 0; state.p = 50; state.e = 50;
        switchScreen('screen-game');
        renderUI();
    }

    function renderUI() {
        const current = state.queue[state.round];
        if (!current) return;
        document.getElementById('ui-round').innerText = `CASE ${state.round + 1} / 20`;
        document.getElementById('ui-link').innerText = current.link;
        document.getElementById('ui-title').innerText = current.title;
        document.getElementById('ui-desc').innerText = current.desc;
        const optionsBox = document.getElementById('ui-options');
        optionsBox.innerHTML = '';
        current.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'btn-option';
            btn.innerHTML = `<span class="text-[11px] font-bold tracking-[0.2em] text-slate-200 uppercase">${opt.label}</span>`;
            btn.onclick = (ev) => {
                ev.preventDefault();
                handleChoice(opt);
            };
            optionsBox.appendChild(btn);
        });
        updateScale();
    }

    function updateScale() {
        const ratio = (state.p / (state.p + state.e)) * 2 - 1;
        const deg = ratio * 28;
        document.getElementById('beam').style.transform = `translate(150px, 80px) rotate(${deg}deg)`;
        document.getElementById('sun-container').style.transform = `translate(0, 30px) scale(${0.85 + state.p/100})`;
        document.getElementById('moon-container').style.transform = `translate(0, 30px) scale(${0.85 + state.e/100})`;
        document.getElementById('sun-container').style.filter = state.p > 60 ? 'drop-shadow(0 0 20px var(--sun-gold))' : 'none';
        document.getElementById('moon-container').style.filter = state.e > 60 ? 'drop-shadow(0 0 20px var(--moon-blue))' : 'none';
    }

    function handleChoice(opt) {
        state.p = Math.min(100, Math.max(0, state.p + opt.p));
        state.e = Math.min(100, Math.max(0, state.e + opt.e));
        if (state.round > 0 && Math.random() < 0.28) {
            triggerSudden();
        } else {
            advance();
        }
    }

    function triggerSudden() {
        const s = suddenLibrary[Math.floor(Math.random() * suddenLibrary.length)];
        document.getElementById('ui-sudden-desc').innerText = s.desc;
        document.getElementById('ui-sudden-title').innerText = s.title;
        state.pendingSudden = s;
        switchScreen('screen-sudden');
    }

    document.getElementById('btn-sudden-close').onclick = () => {
        const s = state.pendingSudden;
        state.p = Math.min(100, Math.max(0, state.p + s.p));
        state.e = Math.min(100, Math.max(0, state.e + s.e));
        advance();
    };

    function advance() {
        if (state.round >= 19 || state.p <= 0 || state.e <= 0) {
            finishGame();
        } else {
            state.round++;
            switchScreen('screen-game');
            renderUI();
        }
    }

    function finishGame() {
        const diff = Math.abs(state.p - state.e);
        let t, d, c;
        if (diff <= 8) {
            t = "傳奇主理人";
            d = "您完美詮釋了『極致的平權即是極致的商機』。在您的領導下，利潤與尊嚴共同綻放，品牌已成為業界的永恆標竿。";
            c = "var(--sun-gold)";
        } else if (diff <= 20) {
            t = "卓越經營者";
            d = "您成功維持了動態的平衡。品牌具備強大的生命力與正義感，是極具價值的企業模範。";
            c = "var(--champagne-gold)";
        } else {
            t = "失衡的願景";
            d = "天秤已嚴重傾斜。缺乏平權支撐的利潤如海市蜃樓，或過度理想的支出使營運陷入困局。請重新審視經營的核心本質。";
            c = "var(--rose-accent)";
        }
        document.getElementById('ui-result-title').innerText = t;
        document.getElementById('ui-result-title').style.color = c;
        document.getElementById('ui-result-desc').innerText = d;
        switchScreen('screen-result');
    }

    function switchScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
</script>
