<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Restaurateur | 精品經營藝術</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Parisienne&family=Cormorant+Garamond:ital,wght@1,500&family=Montserrat:wght@300;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --indigo-deep: #0e101a;
            --champagne-gold: #e2d1c3;
            --sun-gold: #fbbf24;
            --moon-blue: #818cf8;
            --rose: #f43f5e;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--indigo-deep);
            color: #f0f2f5;
            font-family: 'Montserrat', sans-serif;
            margin: 0; padding: 0; overflow: hidden;
            width: 100vw; height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }

        /* 噴砂背景紋理 */
        body::before {
            content: ""; position: fixed; inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='2' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            opacity: 0.04; pointer-events: none; z-index: 100;
        }

        .font-serif { font-family: 'Cormorant Garamond', serif; }
        .font-cursive { font-family: 'Parisienne', cursive; }

        .app-shell {
            width: 90%; max-width: 400px;
            height: 85vh; height: 85dvh;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(226, 209, 195, 0.2);
            border-radius: 3rem; backdrop-filter: blur(30px);
            display: flex; flex-direction: column; position: relative;
            box-shadow: 0 40px 100px -20px rgba(0,0,0,0.8); overflow: hidden;
        }

        .screen { display: none; flex-direction: column; height: 100%; padding: 2rem; width: 100%; }
        .screen.active { display: flex; animation: fadeIn 0.8s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        .btn-luxury {
            background: transparent; border: 1px solid rgba(251, 191, 36, 0.4);
            color: var(--sun-gold); padding: 1.2rem; border-radius: 2.5rem;
            font-size: 0.7rem; font-weight: 700; letter-spacing: 0.5em;
            text-transform: uppercase; cursor: pointer; transition: all 0.3s ease;
        }
        .btn-luxury:active { background: rgba(251, 191, 36, 0.1); transform: scale(0.97); }

        .btn-choice {
            background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 1.2rem; border-radius: 1.5rem; text-align: left;
            margin-bottom: 0.8rem; width: 100%; cursor: pointer; transition: all 0.3s;
        }
        .btn-choice:active { border-color: var(--sun-gold); background: rgba(255,255,255,0.08); transform: translateX(5px); }

        /* 天秤元件視覺 */
        #beam-group { transition: transform 1.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .orb-viz { transition: transform 1s ease-in-out, opacity 0.8s; }
        .glow-moon { filter: drop-shadow(0 0 12px var(--moon-blue)); }
        .glow-sun { filter: drop-shadow(0 0 12px var(--sun-gold)); }

        .scroll-content { overflow-y: auto; flex-grow: 1; padding-right: 4px; display: flex; flex-direction: column; }
        .scroll-content::-webkit-scrollbar { width: 0px; }

        .progress-track { height: 2px; width: 100%; background: rgba(255,255,255,0.05); border-radius: 2px; margin-bottom: 1.5rem; }
        .progress-fill { height: 100%; background: var(--champagne-gold); transition: width 0.8s ease; }
    </style>
</head>
<body>

<div class="app-shell">
    
    <!-- START SCREEN -->
    <div id="screen-start" class="screen active justify-center items-center text-center">
        <h2 class="text-[8px] tracking-[1em] text-white/20 uppercase font-bold mb-8">Management Equilibrium</h2>

        <p class="font-serif italic text-xl text-[#E2D1C3]/60 mb-20 leading-relaxed px-4">
            「左擁如月平權，右抱如日利潤。<br>主理人，請啟動天秤。」
        </p>
        <button onclick="handleStart()" class="btn-luxury w-full">啟動模擬</button>
    </div>

    <!-- PLAY SCREEN -->

        <div class="w-full flex flex-col items-center justify-center border-b border-white/5 mb-6 pb-4">

                <defs>
                    <linearGradient id="balanceGrad" x1="0%" y1="0%" x2="100%" y2="0%">

                        <stop offset="100%" stop-color="var(--sun-gold)" />
                    </linearGradient>
                </defs>
                <g id="beam-group" transform="translate(150, 75)">
                    <line x1="-90" y1="0" x2="90" y2="0" stroke="url(#balanceGrad)" stroke-width="2" stroke-linecap="round" />
                    
                    <!-- 左月亮 (Equity) -->
                    <g transform="translate(-90, 0)">
                        <line x1="0" y1="0" x2="0" y2="25" stroke="#E2D1C3" stroke-width="0.5" opacity="0.2" />
                        <g id="moon-orb" class="orb-viz" transform="translate(0, 35)">
                            <!-- 使用穩定的單一路徑繪製月亮 -->
                            <path d="M 5,-9 A 9,9 0 1,0 5,9 A 11,11 0 0,1 5,-9 Z" fill="var(--moon-blue)" class="glow-moon" />
                        </g>
                    </g>

                    <!-- 右太陽 (Profit) -->
                    <g transform="translate(90, 0)">
                        <line x1="0" y1="0" x2="0" y2="25" stroke="#E2D1C3" stroke-width="0.5" opacity="0.2" />
                        <g id="sun-orb" class="orb-viz" transform="translate(0, 35)">
                            <circle r="9" fill="var(--sun-gold)" class="glow-sun" />
                            <circle r="13" stroke="var(--sun-gold)" stroke-width="0.2" stroke-dasharray="1 3" opacity="0.4" />
                        </g>
                    </g>
                </g>
                <circle cx="150" cy="75" r="4" fill="#0e101a" stroke="#E2D1C3" stroke-width="1.2" />
                <path d="M150 75 L150 130" stroke="#E2D1C3" stroke-width="0.5" opacity="0.2" />
            </svg>
            <div class="flex gap-24 text-[7px] tracking-[0.4em] font-bold text-white/10 uppercase mt-2">
                <span>Equity</span><span>Profit</span>
            </div>
        </div>

        <div class="scroll-content">
            <div class="progress-track"><div id="ui-progress" class="progress-fill" style="width: 10%"></div></div>
            <div class="flex justify-between items-center mb-4">
                <span id="ui-case-tag" class="text-[9px] font-black text-amber-500 bg-amber-500/10 px-3 py-1 rounded-full uppercase">CASE</span>
                <span id="ui-link" class="text-[8px] text-white/30 uppercase font-bold tracking-widest border border-white/5 px-3 py-1 rounded-full">CEDAW</span>
            </div>
            <h3 id="ui-title" class="text-xl font-serif text-[#E2D1C3] mb-4 leading-tight"></h3>
            <p id="ui-desc" class="text-slate-400 text-sm italic mb-10 leading-relaxed border-l border-white/10 pl-4"></p>
            <div id="ui-choices" class="mt-auto"></div>
        </div>
    </div>

    <!-- SUDDEN SCREEN -->
    <div id="screen-sudden" class="screen justify-center items-center text-center">
        <div class="w-16 h-16 rounded-full border border-rose/30 flex items-center justify-center mb-10 text-rose shadow-[0_0_30px_rgba(244,63,94,0.15)]">
            <span class="text-3xl font-serif">!</span>
        </div>
        <h3 id="ui-sudden-title" class="text-rose font-bold text-[10px] uppercase tracking-[0.5em] mb-6">命運的震盪</h3>
        <p id="ui-sudden-desc" class="text-slate-200 text-lg italic mb-14 px-6 leading-relaxed"></p>
        <button onclick="handleSuddenClose()" class="btn-luxury w-full !text-rose !border-rose/30">承受變局</button>
    </div>

    <!-- RESULT SCREEN -->
    <div id="screen-result" class="screen justify-center items-center text-center">
        <span class="text-[9px] tracking-[1em] text-white/20 uppercase font-bold mb-10">Final Analysis</span>
        <h2 id="ui-result-title" class="text-4xl font-serif italic mb-10 tracking-wide"></h2>
        <div class="bg-white/[0.03] p-10 rounded-[3rem] border border-white/10 mb-16 w-full text-sm text-slate-400 leading-relaxed italic shadow-inner">
            <p id="ui-result-desc"></p>
        </div>
        <button onclick="location.reload()" class="btn-luxury w-full">重啟經營循環</button>
    </div>

</div>

<footer class="fixed bottom-4 text-[8px] tracking-[1.2em] text-white/10 uppercase font-bold text-center z-0 w-full">
    Integrity • Leadership • Vision
</footer>

        { t: "尾牙互動規定", d: "明確規定表演不得包含物化女性或強迫社交。", l: "職場倫理與安全", a: { l: "建立尊重彼此的宴會觀", p: 15, e: 25 }, b: { l: "熱鬧才是尾牙不再限制", p: 20, e: -25 } },
        { t: "供應商誠信約章", d: "要求供應商簽署不壓榨、保障性平條約。", l: "社會責任連鎖", a: { l: "嚴選鏈結爭取高端訂單", p: 40, e: 35 }, b: { l: "價格最優不看附加條款", p: 50, e: -25 } },
        { t: "技能證照補貼", d: "全額補助考取不分性別領域的專業餐飲執照。", l: "教育權利平等", a: { l: "厚植專業實力建立溢價", p: 35, e: 20 }, b: { l: "員工個人成長自理經費", p: 15, e: -5 } },
        { t: "匿名騷擾信箱", d: "建立外部律師介入的匿名性騷擾處理系統。", l: "救濟與保障制度", a: { l: "深度治理降低營運風險", p: 20, e: 35 }, b: { l: "內部協調處理節省律費", p: 25, e: -20 } },
        { t: "心理諮商保險", d: "將心理諮商納入保險，應對情緒勞動壓力。", l: "職場心理健康", a: { l: "穩定團隊降低離職風險", p: 25, e: 20 }, b: { l: "非公司核心業務預算", p: 15, e: 0 } },
        { t: "全場語音引導", d: "為高齡員工導入語音指令導引系統。", l: "CEDAW 第 4 條", a: { l: "技術升級邁向通用設計", p: 30, e: 25 }, b: { l: "維持手動操作降低費用", p: 15, e: -10 } },
        { t: "職務垂直輪動", d: "鼓勵行政參與內場實作，內場參與管理培訓。", l: "消除職務隔離", a: { l: "打破隔閡激發營運創意", p: 35, e: 25 }, b: { l: "各安其位確保分工精密", p: 20, e: -10 } },
        { t: "高齡接班教練", d: "聘請屆退員工擔任顧問教練，延長職涯。", l: "人才續航計畫", a: { l: "經驗傳承降低管理失誤", p: 40, e: 20 }, b: { l: "屆齡即退確保人員換血", p: 25, e: -15 } },
        { t: "外籍員工連假", d: "支持外國同仁一次性申請較長假期返鄉。", l: "文化平等保障", a: { l: "包容文化建立終身忠誠", p: 20, e: 35 }, b: { l: "以人力吃緊為由婉拒", p: 35, e: -20 } },
        { t: "產後適應減時", d: "允許產後同仁申請減時不減薪過渡排班。", l: "CEDAW 第 11 條", a: { l: "留住核心人才避免斷層", p: 22, e: 35 }, b: { l: "按工時計費節省預算", p: 30, e: -25 } },
        { t: "品牌形象廣告", d: "選取專業多樣化員工樣貌，而非外聘模特。", l: "消除刻板印象", a: { l: "建立具備溫度的品牌力", p: 30, e: 25 }, b: { l: "選取大眾偏好美型宣傳", p: 40, e: -15 } },
        { t: "薪資公正稽核", d: "聘請會計師事務所針對性別薪資進行稽核。", l: "第 11 條同工同酬", a: { l: "獲取投資人與社會信賴", p: 45, e: 30 }, b: { l: "自行調整省下外部費用", p: 20, e: -10 } },
        { t: "多元信仰空間", d: "員工休息區劃設靜心祈禱角，包容信仰。", l: "文化權利共融", a: { l: "提升少數群體向心力", p: 15, e: 25 }, b: { l: "空間有限以用餐為主", p: 10, e: -10 } },
        { t: "數位管理紅利", d: "導入全數位排班系統，降低人力衝突成本。", l: "管理效能優化", a: { l: "技術獲利反饋員工福利", p: 50, e: 15 }, b: { l: "數據監控極大化產能", p: 35, e: -20 } },
        { t: "男性產假津貼", d: "額外給予休滿產假男性員工家庭基金獎勵。", l: "實質平等實踐", a: { l: "翻轉企業標籤吸引人才", p: 25, e: 35 }, b: { l: "依現有育嬰補助發放", p: 20, e: -10 } },
        { t: "主理人未來宣言", d: "宣佈餐廳將以「共融」作為第一經營指標。", l: "品牌永續願景", a: { l: "發布宣言邁向精品之路", p: 55, e: 40 }, b: { l: "低調獲利維持穩健經營", p: 30, e: -10 } }
    ];

    const SUDDEN = [
        { t: "【法規大稽查】", d: "政府突然實施職場性平稽核。若您的平權數值不足，品牌將面臨重罰與停業處分。", p: -60, e: 0 },
        { t: "【社群媒體盛讚】", d: "您的友善職場政策被多位影響力人士轉發，品牌聲望大漲，訂位預約已滿至明年。", p: 75, e: 25 },
        { t: "【國際金獎標章】", d: "榮獲國際平權餐飲標章，這項殊榮吸引了全球大型注資，獲利能力大幅提升。", p: 90, e: 40 },
        { t: "【人才離職風暴】", d: "因忽視員工對公平體制的訴求引發基層抗議，營運陷入人力短缺的困境。", p: -45, e: -30 },
        { t: "【ESG 報告優選】", d: "被評為年度永續經營模範，帶動高端商務客群穩定湧入您的餐廳。", p: 65, e: 25 },
        { t: "【供應商權益醜聞】", d: "核心供應商被爆出壓榨勞工，您的品牌因連帶責任遭受抵制，營收驟降。", p: -40, e: -20 },
        { t: "【數位轉型紅利】", d: "新系統研發成功並大幅提升了跨部門協作效率，節省了巨額人力成本支出。", p: 60, e: 10 },
        { t: "【育兒友善標章】", d: "榮獲官方頒發之年度育兒友善職場標章，本月獲得政府大額補助獎勵金。", p: 35, e: 20 },
        { t: "【薪資不公爆料】", d: "匿名員工爆料內部薪資制度依然存在性別隱形缺口，品牌公正性受到質疑。", p: -30, e: -40 },
        { t: "【國際巨星造訪】", d: "知名平權運動巨星私下造訪並發文推廣，品牌效應引發了史無前例的溢價空間。", p: 80, e: 15 }
    ];

    let state = { p: 50, e: 50, round: 0, queue: [], pending: null };

    function switchScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        const target = document.getElementById(id);
        if (target) target.classList.add('active');
    }

    function handleStart() {
        state.queue = [...DB].sort(() => Math.random() - 0.5).slice(0, 10);
        state.round = 0; state.p = 50; state.e = 50;
        switchScreen('screen-play');
        renderUI();
    }

    function renderUI() {
        const cur = state.queue[state.round];
        if (!cur) return;
        
        document.getElementById('ui-progress').style.width = `${(state.round + 1) * 10}%`;
        document.getElementById('ui-link').innerText = cur.l;
        document.getElementById('ui-title').innerText = cur.t;
        document.getElementById('ui-desc').innerText = cur.d;
        
        const box = document.getElementById('ui-choices');
        box.innerHTML = '';
        [cur.a, cur.b].forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'btn-choice';
            btn.innerHTML = `<span class="text-[10px] font-bold text-slate-200 uppercase tracking-widest">${opt.l}</span>`;
            btn.onclick = () => {
                state.p = Math.min(100, Math.max(0, state.p + opt.p));
                state.e = Math.min(100, Math.max(0, state.e + opt.e));
                
                if (state.round > 0 && Math.random() < 0.28) {
                    const s = SUDDEN[Math.floor(Math.random() * SUDDEN.length)];
                    state.pending = s;
                    document.getElementById('ui-sudden-desc').innerText = s.d;
                    document.getElementById('ui-sudden-title').innerText = s.t;
                    switchScreen('screen-sudden');
                } else {
                    next();
                }
            };
            box.appendChild(btn);
        });
        updateScale();
    }

    function updateScale() {
        const total = state.p + state.e;
        const deg = total === 0 ? 0 : ((state.p / total) * 2 - 1) * 28;
        document.getElementById('beam-group').style.transform = `translate(150px, 75px) rotate(${deg}deg)`;
        
        const moonScale = 0.85 + state.e/100;
        const sunScale = 0.85 + state.p/100;
        
        document.getElementById('moon-orb').style.transform = `scale(${moonScale})`;
        document.getElementById('sun-orb').style.transform = `scale(${sunScale})`;
        
        document.getElementById('moon-orb').style.opacity = state.e < 20 ? "0.4" : "1";
        document.getElementById('sun-orb').style.opacity = state.p < 20 ? "0.4" : "1";
    }

    function handleSuddenClose() {
        if (state.pending) {
            state.p = Math.min(100, Math.max(0, state.p + state.pending.p));
            state.e = Math.min(100, Math.max(0, state.e + state.pending.e));
        }
        next();
    }

    function next() {
        if (state.round >= 9 || state.p <= 0 || state.e <= 0) {
            finish();
        } else {
            state.round++;
            switchScreen('screen-play');
            renderUI();
        }
    }

    function finish() {
        const d = Math.abs(state.p - state.e);
        let t, ds, c;
        if (d <= 8) {
            t = "傳奇主理人"; ds = "您達成極致的藝術級平衡。利潤與尊嚴在此共同綻放，品牌已成為業界永恆的標竿。"; c = "var(--sun-gold)";
        } else if (d <= 20) {
            t = "卓越經營者"; ds = "您在變動中守住了平衡。品牌具備強大的生命力與價值感，是極具價值的企業模範。"; c = "var(--champagne-gold)";
        } else {
            t = "失衡的願景"; ds = "天秤已傾斜。缺乏平權支撐的利潤如海市蜃樓，或過度理想的支出使營運陷入困局。請重新審視經營的本質。"; c = "var(--rose)";
        }
        document.getElementById('ui-result-title').innerText = t;
        document.getElementById('ui-result-title').style.color = c;
        document.getElementById('ui-result-desc').innerText = ds;
        switchScreen('screen-result');
    }
</script>
